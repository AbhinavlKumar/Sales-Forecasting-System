<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sales Forecast Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>

<body>

    <div class="container">

        <div class="dashboard-card">

            <h1 class="title">
                Sales Forecast Dashboard
            </h1>

            <p class="subtitle">
                Analyze monthly sales trends and moving averages
            </p>

            <div class="button-container">
                <button class="btn btn-primary" onclick="loadChart()">
                    Generate Analysis
                </button>
            </div>

            <div class="chart-container">
                <img
                    id="salesChart"
                    src=""
                    alt="Sales Chart"
                    class="img-fluid rounded shadow"
                >
            </div>

        </div>

    </div>

<script>
    function loadChart() {
        document.getElementById("salesChart").src =
            "/run-analysis?" + new Date().getTime();
    }
</script>

</body>
</html>
