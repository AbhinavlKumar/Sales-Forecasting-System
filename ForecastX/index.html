<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Dashboard</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="card-box">

        <h1>Sales Forecast Dashboard</h1>

        <p>Analyze sales trends using moving averages</p>

        <button class="btn btn-primary"
                onclick="loadChart()">
            Generate Analysis
        </button>

        <div class="chart-area">
            <img id="chart"
                 src=""
                 class="img-fluid">
        </div>

    </div>

</div>

<script>
function loadChart() {
    document.getElementById("chart").src =
        "/run-analysis?" + new Date().getTime();
}
</script>

</body>
</html>
